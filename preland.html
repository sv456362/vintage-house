<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage Girls - Welcome</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .content-wrapper {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h2 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            color: #ffffff;
        }
        .intro-text {
            font-size: 1.1rem;
            color: #cccccc;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        /* Место под ваше изображение или GIF */
        .placeholder-image {
            width: 100%;
            height: 350px;
            background-color: #222222;
            border: 1px dashed #444444;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #666666;
            margin-bottom: 30px;
            border-radius: 4px;
        }
        .offer-btn {
            display: inline-block;
            background-color: #ff3366;
            color: #ffffff;
            text-decoration: none;
            padding: 18px 60px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 4px;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }
        .offer-btn:hover {
            background-color: #ff1a53;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <h2>Vintage Girls</h2>
        <p class="intro-text">Explore our exclusive collection of classic retro aesthetics and timeless beauty. Private access granted.</p>
        
        <!-- Сюда вы можете вставить картинку через тег <img>, когда она будет готова -->
        <div class="placeholder-image">
            [ Место для вашего фото / GIF / Карусели ]
        </div>
        
        <!-- КНОПКА ДЛЯ ТДС: Замените href на адрес вашей ТДС -->
        <a href="https://your-tds-domain.com" id="offerLink" class="offer-btn">ACCESS NOW</a>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. Считываем точный слаг из адресной строки (например, "?reddit")
            const currentSlug = window.location.search;

            // 2. Если слаг передан, приклеиваем его в самый конец адреса ТДС
            if (currentSlug) {
                const offerBtn = document.getElementById("offerLink");
                const baseHref = offerBtn.href;

                // Скрипт соединяет адрес ТДС со слагом. На выходе: https://site.com
                offerBtn.href = baseHref + currentSlug;
            }
        });
    </script>

</body>
</html>
