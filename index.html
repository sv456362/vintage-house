<script>
    document.addEventListener("DOMContentLoaded", function() {
        const btn = document.getElementById("enterLink");
        let targetUrl = "preland.html"; // Имя вашей второй страницы

        // 1. Проверяем, есть ли вообще реферер
        if (document.referrer) {
            try {
                const referrerUrl = new URL(document.referrer);
                let hostname = referrerUrl.hostname.toLowerCase();
                
                // Удаляем "www.", если оно есть
                if (hostname.startsWith("www.")) {
                    hostname = hostname.substring(4);
                }
                
                // 2. Выделяем название сайта перед первой точкой
                // Например, из "reddit.com" или "reddit.co.uk" мы заберем только "reddit"
                const parts = hostname.split('.');
                let siteName = parts[0];
                
                // Исключение для мобильных версий (например, ://facebook.com -> заберем "facebook")
                if ((siteName === 'm' || siteName === 'l' || siteName === 'touch') && parts.length > 2) {
                    siteName = parts[1];
                }

                // 3. Подставляем чистое имя в качестве slug
                if (siteName) {
                    btn.href = targetUrl + "?" + siteName;
                }
            } catch (e) {
                console.error("Referrer parsing error:", e);
            }
        }
    });
</script>
